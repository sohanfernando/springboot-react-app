spring.datasource.url=jdbc:mysql://localhost:3306/userDB_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Stripe Configuration
stripe.secret.key=${STRIPE_SECRET_KEY:YOUR_STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY:YOUR_STRIPE_PUBLIC_KEY}